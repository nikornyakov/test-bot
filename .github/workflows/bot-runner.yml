name: Basketball Bot Runner

on:
  schedule:
    # Запуск в 12:00 по МСК (09:00 UTC) в понедельник, среда (опросы) и вторник, четверг (напоминания)
    - cron: '0 9 * * 1,2,3,4'
  workflow_dispatch:
    inputs:
      action:
        description: 'Действие бота'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - welcome
          - poll
          - reminder

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        if [[ "${{ github.event.inputs.action }}" == "welcome" ]]; then
          python simple_bot.py welcome
        elif [[ "${{ github.event.inputs.action }}" == "auto" ]] || [[ -z "${{ github.event.inputs.action }}" ]]; then
          python simple_bot.py
        fi
        
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs
        path: simple_bot.log
        retention-days: 30
