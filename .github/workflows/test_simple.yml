name: Test Simple System

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Тип теста'
        required: true
        default: 'demo'
        type: choice
        options:
        - demo
        - analytics
        - collection

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run test based on type
      run: |
        case "${{ github.event.inputs.test_type }}" in
          "demo")
            echo "🧪 Запуск демо-теста..."
            python3 test_simple_system.py
            ;;
          "analytics")
            echo "📈 Тестирование аналитики..."
            python3 simple_analytics.py
            ;;
          "collection")
            echo "🔍 Тестирование сбора данных (демо)..."
            echo "BOT_TOKEN=demo_token" >> .env
            echo "GROUP_ID=-1001234567890" >> .env
            python3 simple_poll_collector.py || echo "Ожидаемая ошибка - нет реального токена"
            ;;
        esac
        
    - name: Show results
      run: |
        echo "📊 Результаты теста:"
        if [ -f "reports/polls.json" ]; then
          echo "✅ Файл polls.json создан"
          echo "📋 Размер: $(wc -l < reports/polls.json) строк"
        else
          echo "❌ Файл polls.json не найден"
        fi
