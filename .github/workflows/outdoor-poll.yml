name: Outdoor Basketball Poll

on:
  schedule:
    # Запуск в субботу в 10:00 по МСК (07:00 UTC) для опроса о воскресной тренировке
    - cron: '0 7 * * 6'
  workflow_dispatch:

jobs:
  send-outdoor-poll:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Send outdoor poll
      env:
        BOT_TOKEN: ${{ secrets.OUTDOOR_BOT_TOKEN }}
        GROUP_ID: ${{ secrets.OUTDOOR_GROUP_ID }}
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      run: |
        python simple_bot.py outdoor
        
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: outdoor-poll-logs
        path: "*.log"
        retention-days: 7
