name: Analytics and Reports

on:
  schedule:
    # Еженедельный отчет по посещаемости - каждое воскресение в 20:00 МСК
    - cron: '0 17 * * 0'
    # Месячный отчет - 1 числа каждого месяца в 10:00 МСК
    - cron: '0 7 1 * *'
    # Годовой отчет - 1 января в 12:00 МСК
    - cron: '0 9 1 1 *'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Тип отчета'
        required: true
        default: 'attendance'
        type: choice
        options:
        - attendance
        - monthly
        - yearly
        - full
      days_back:
        description: 'Количество дней для отчета посещаемости'
        required: false
        default: '30'
        type: string
      year:
        description: 'Год для годового отчета'
        required: false
        default: ''
        type: string

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set up environment variables
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GROUP_ID: ${{ secrets.GROUP_ID }}
      run: |
        echo "BOT_TOKEN=$BOT_TOKEN" >> .env
        echo "GROUP_ID=$GROUP_ID" >> .env
        
    - name: Generate attendance report
      if: github.event_name == 'schedule' && github.event.schedule == '0 17 * * 0'
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GROUP_ID: ${{ secrets.GROUP_ID }}
      run: |
        python reports/generate_reports.py attendance 30
        
    - name: Generate monthly report
      if: github.event_name == 'schedule' && github.event.schedule == '0 7 1 * *'
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GROUP_ID: ${{ secrets.GROUP_ID }}
      run: |
        python reports/generate_reports.py monthly
        
    - name: Generate yearly report
      if: github.event_name == 'schedule' && github.event.schedule == '0 9 1 1 *'
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GROUP_ID: ${{ secrets.GROUP_ID }}
      run: |
        python reports/generate_reports.py yearly
        
    - name: Generate manual report
      if: github.event_name == 'workflow_dispatch'
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GROUP_ID: ${{ secrets.GROUP_ID }}
      run: |
        REPORT_TYPE="${{ github.event.inputs.report_type }}"
        DAYS_BACK="${{ github.event.inputs.days_back }}"
        YEAR="${{ github.event.inputs.year }}"
        
        case $REPORT_TYPE in
          "attendance")
            python reports/generate_reports.py attendance ${DAYS_BACK:-30}
            ;;
          "monthly")
            python reports/generate_reports.py monthly
            ;;
          "yearly")
            if [ -n "$YEAR" ]; then
              python reports/generate_reports.py yearly $YEAR
            else
              python reports/generate_reports.py yearly
            fi
            ;;
          "full")
            python reports/generate_reports.py full
            ;;
        esac
        
    - name: Upload analytics data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: reports-data-${{ github.run_number }}
        path: reports/
        retention-days: 90
        
    - name: Commit and push analytics data
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add reports/
        git diff --staged --quiet || git commit -m "Update analytics data - $(date +'%Y-%m-%d')"
        git push
